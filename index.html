<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Fit OS</title>
    <style>
        :root {
            --bg-dark: #000000; --surface: rgba(28, 28, 30, 0.7); --surface-solid: #1C1C1E;
            --elevated: rgba(44, 44, 46, 0.8); --text-main: #FFFFFF; --text-muted: #8E8E93;
            --border: rgba(255, 255, 255, 0.1);
            --accent-ali: #0A84FF; --accent-kristen: #BF5AF2; --accent-kam: #FF9F0A; --accent-ashton: #32D74B;
            --current-accent: #0A84FF; --success: #32D74B; --danger: #FF453A;
            --glass-blur: blur(20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; -webkit-user-select: none; user-select: none; overflow-x: hidden; }

        .ambient-glow { position: fixed; top: -10vh; left: -10vw; width: 120vw; height: 50vh; background: radial-gradient(circle, var(--current-accent) 0%, transparent 70%); opacity: 0.15; z-index: -1; transition: background 0.5s ease; pointer-events: none; }

        #app { width: 100%; max-width: 430px; min-height: 100vh; position: relative; padding-bottom: 120px; display: flex; flex-direction: column; }

        header { display: flex; align-items: center; justify-content: space-between; padding: 24px 20px 16px 20px; padding-top: max(24px, env(safe-area-inset-top)); background: rgba(0,0,0,0.5); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--current-accent); transition: color 0.3s; }
        .back-btn { background: none; border: none; color: var(--text-main); font-size: 16px; font-weight: 600; cursor: pointer; display: none; padding: 8px 12px 8px 0; }

        .screen { display: none; padding: 20px; animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); flex: 1; }
        .screen.active { display: block; }
        @keyframes scaleIn { 0% { opacity: 0; transform: scale(0.97) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        h1 { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; line-height: 1.1; }
        .subtitle { color: var(--text-muted); font-size: 16px; font-weight: 500; margin-bottom: 32px; line-height: 1.4; }
        .section-header { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; margin: 32px 0 16px 0; }

        /* Profiles */
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px 16px; text-align: center; cursor: pointer; transition: 0.2s; backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); }
        .profile-card:active { transform: scale(0.95); background: var(--elevated); }
        .avatar { width: 72px; height: 72px; border-radius: 36px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; background: rgba(0,0,0,0.5); border: 2px solid; }
        .profile-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .profile-desc { font-size: 13px; color: var(--text-muted); font-weight: 500; }

        /* Status Banner */
        .status-banner { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 24px; display: flex; align-items: flex-start; gap: 12px; }
        .status-icon { font-size: 24px; }
        .status-text h4 { font-size: 15px; margin-bottom: 4px; }
        .status-text p { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

        /* Menus */
        .menu-list { display: flex; flex-direction: column; gap: 12px; }
        .menu-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .menu-card:active { background: var(--elevated); }
        .menu-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
        .menu-meta { font-size: 14px; color: var(--text-muted); font-weight: 500; }

        /* EXERCISE CARDS WITH EMBEDDED VECTOR VISUALS */
        .exercise-card { background: var(--surface-solid); border-radius: 24px; margin-bottom: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .ex-header { padding: 20px 20px 16px 20px; background: rgba(255,255,255,0.02); }
        .ex-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        .ex-target { font-size: 12px; font-weight: 800; color: var(--current-accent); text-transform: uppercase; letter-spacing: 1px; }

        /* Custom Vector Diagram Module */
        .vector-dashboard { display: grid; grid-template-columns: 1fr 1fr; background: var(--border); gap: 1px; border-bottom: 1px solid var(--border); border-top: 1px solid var(--border); }
        .vector-cell { background: var(--surface-solid); padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
        .vector-icon-container { width: 64px; height: 64px; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; }
        .vector-icon-container svg { width: 40px; height: 40px; fill: none; stroke: var(--current-accent); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .vector-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .vector-value { font-size: 15px; font-weight: 800; color: #FFF; line-height: 1.3; }

        /* Precise Matrix Row */
        .matrix-row { display: flex; background: var(--surface-solid); border-bottom: 1px solid var(--border); }
        .matrix-item { flex: 1; padding: 12px 16px; text-align: center; border-right: 1px solid var(--border); }
        .matrix-item:last-child { border-right: none; }
        .matrix-label { font-size: 10px; color: var(--text-muted); font-weight: 800; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
        .matrix-val { font-size: 16px; font-weight: 800; color: #FFF; }

        /* Coach Toggle */
        .coach-toggle { width: 100%; background: none; border: none; border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 700; color: var(--text-main); cursor: pointer; }
        .coach-content { display: none; padding: 20px; font-size: 15px; line-height: 1.5; color: #D1D1D6; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); }
        .coach-content.active { display: block; }
        .coach-content ul { padding-left: 20px; margin-bottom: 16px; }
        .coach-content li { margin-bottom: 10px; }
        .tip-box { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; border-left: 4px solid var(--current-accent); }

        /* Tracker */
        .tracker-zone { padding: 20px; }
        .tracker-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .tracker-table th { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; padding-bottom: 4px; }
        .tracker-table td { text-align: center; vertical-align: middle; }
        .set-pill { background: rgba(255,255,255,0.1); width: 32px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-weight: 700; font-size: 13px; color: var(--text-muted); }
        .val-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #FFF; width: 70px; padding: 12px 4px; border-radius: 12px; text-align: center; font-size: 18px; font-weight: 700; -moz-appearance: textfield; }
        .val-input:focus { outline: none; border-color: var(--current-accent); background: rgba(0,0,0,0.5); }
        .check-btn { background: rgba(255,255,255,0.1); border: none; width: 56px; height: 44px; border-radius: 14px; margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .check-btn svg { fill: var(--text-muted); width: 22px; height: 22px; transition: 0.3s; }
        
        .row-done .check-btn { background: var(--success); transform: scale(1.05); }
        .row-done .check-btn svg { fill: #000; }
        .row-done .val-input { background: transparent; border-color: transparent; color: var(--success); pointer-events: none; }
        .row-done .set-pill { background: var(--success); color: #000; }

        .finish-btn { width: 100%; background: var(--current-accent); color: #FFF; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); transition: 0.2s; }
        .finish-btn:active { transform: scale(0.97); }

        /* Rest Timer Bottom Sheet */
        #timer-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(28, 28, 30, 0.95); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; }
        #timer-sheet.active { transform: translateY(0); }
        .timer-val { font-size: 38px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text-main); letter-spacing: -1px; }
        .timer-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .skip-btn { background: rgba(255,255,255,0.1); color: #FFF; border: none; padding: 14px 28px; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; }

    </style>
</head>
<body>

<div class="ambient-glow" id="glow"></div>

<div id="app">
    <header>
        <button class="back-btn" id="btn-back" onclick="navBack()">❮ Back</button>
        <div class="header-title" id="app-header-title">FAMILY FIT</div>
        <div style="width: 60px;"></div>
    </header>

    <!-- SCREEN 1: PROFILES -->
    <div id="screen-users" class="screen active">
        <h1>Welcome.</h1>
        <p class="subtitle">Select your profile to initialize your dashboard.</p>
        
        <div class="profile-grid">
            <div class="profile-card" onclick="openDash('Ali', 'var(--accent-ali)', 'ali')">
                <div class="avatar" style="border-color: var(--accent-ali); color: var(--accent-ali);">💪</div>
                <div class="profile-name">Ali</div>
                <div class="profile-desc">Strength & Recomp</div>
            </div>
            <div class="profile-card" onclick="openDash('Kristen', 'var(--accent-kristen)', 'kristen')">
                <div class="avatar" style="border-color: var(--accent-kristen); color: var(--accent-kristen);">🧘‍♀️</div>
                <div class="profile-name">Kristen</div>
                <div class="profile-desc">Pilates & Tone</div>
            </div>
            <div class="profile-card" onclick="openDash('Kam', 'var(--accent-kam)', 'kam')">
                <div class="avatar" style="border-color: var(--accent-kam); color: var(--accent-kam);">⚡️</div>
                <div class="profile-name">Kam (13)</div>
                <div class="profile-desc">Foundational</div>
            </div>
            <div class="profile-card" onclick="openDash('Ashton', 'var(--accent-ashton)', 'ashton')">
                <div class="avatar" style="border-color: var(--accent-ashton); color: var(--accent-ashton);">🏃‍♂️</div>
                <div class="profile-name">Ashton (8)</div>
                <div class="profile-desc">Active Play</div>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: DASHBOARD -->
    <div id="screen-dash" class="screen">
        <h1 id="dash-title">Hi</h1>
        
        <div id="smart-banner" class="status-banner" style="display: none;">
            <div class="status-icon" id="smart-icon">🧠</div>
            <div class="status-text">
                <h4 id="smart-title">Status</h4>
                <p id="smart-msg">Analyzing recovery data...</p>
            </div>
        </div>

        <div id="dash-content">
            <div class="section-header">Programmed Plans</div>
            <div class="menu-list" id="routine-list"></div>
        </div>
    </div>

    <!-- SCREEN 3: WORKOUT ENGINE -->
    <div id="screen-workout" class="screen">
        <h1 id="workout-title" style="margin-bottom: 24px;">Workout</h1>
        <div id="workout-feed"></div>
        <button class="finish-btn" id="finish-btn" onclick="finishWorkout()">Complete Session</button>
    </div>

    <!-- REST TIMER -->
    <div id="timer-sheet">
        <div>
            <div class="timer-label">Recovery Timer</div>
            <div class="timer-val" id="timer-display">01:00</div>
        </div>
        <button class="skip-btn" onclick="stopTimer()">Skip</button>
    </div>
</div>

<script>
    /* ========================================================================
       PREMIUM VECTOR ICON LIBRARY
       ======================================================================== */
    const vectors = {
        d_handle: `<path d="M7 4v16M7 4c6 0 10 3.5 10 8s-4 8-10 8" />`,
        v_bar: `<path d="M4 6l8 12 8-12" stroke-width="3" />`,
        rope: `<path d="M12 4v12" stroke-dasharray="2 2" stroke-width="4"/><circle cx="12" cy="18" r="3" fill="var(--current-accent)"/><circle cx="12" cy="4" r="3" fill="var(--current-accent)"/>`,
        straight_bar: `<path d="M3 12h18" stroke-width="4"/><rect x="5" y="10" width="3" height="4" fill="var(--current-accent)"/><rect x="16" y="10" width="3" height="4" fill="var(--current-accent)"/>`,
        dumbbells: `<rect x="4" y="8" width="4" height="8"/><rect x="16" y="8" width="4" height="8"/><path d="M8 12h8" stroke-width="3"/>`,
        ankle_strap: `<rect x="6" y="8" width="12" height="8" rx="2" stroke-width="2"/><circle cx="12" cy="12" r="1.5" fill="var(--current-accent)"/>`,
        bench: `<path d="M4 10h16M6 10v10M18 10v10" stroke-width="3"/>`,
        floor: `<path d="M2 18h20M7 14l5-4 5 4" stroke-width="2"/>`
    };

    /* ========================================================================
       DATABASE: Exercises with Hardcoded Visuals & Coordinates
       ======================================================================== */
    const db = {
        cable_chest_press: {
            name: "Flat Bench Cable Press", target: "Chest & Triceps",
            icon: vectors.d_handle, attName: "2x D-Handles",
            spaceIcon: vectors.bench, spcName: "Bench Centered",
            h: "8", a: "4",
            steps: ["Center the bench perfectly between the pulleys.", "Lie flat, pull handles to armpits before pressing.", "Press straight up and together over your chest."], tip: "Keep your shoulders pinned to the pad."
        },
        cable_row: {
            name: "Seated Cable Row", target: "Back & Biceps",
            icon: vectors.v_bar, attName: "V-Bar",
            spaceIcon: vectors.floor, spcName: "Sit on Floor",
            h: "6", a: "1",
            steps: ["Sit on floor facing machine, feet braced.", "Keep your back perfectly straight.", "Pull V-bar to belly button."], tip: "Squeeze shoulder blades BEFORE pulling."
        },
        cable_squat: {
            name: "Cable Goblet Squat", target: "Quads & Glutes",
            icon: vectors.straight_bar, attName: "Straight Bar",
            spaceIcon: vectors.floor, spcName: "Open Floor",
            h: "8", a: "1",
            steps: ["Attach bar to low pulley.", "Hold bar tight against collarbone.", "Squat down, pushing hips back."], tip: "Drive through heels."
        },
        face_pull: {
            name: "Cable Face Pulls", target: "Upper Back & Posture",
            icon: vectors.rope, attName: "Tricep Rope",
            spaceIcon: vectors.floor, spcName: "Open Floor",
            h: "2", a: "1",
            steps: ["Grab rope with thumbs pointing backward.", "Pull hands apart towards ears, flaring elbows."], tip: "Focus intensely on the squeeze."
        },
        db_lateral_raise: {
            name: "Dumbbell Lateral Raises", target: "Shoulders",
            icon: vectors.dumbbells, attName: "Light Dumbbells",
            spaceIcon: vectors.floor, spcName: "Open Floor",
            h: "-", a: "-",
            steps: ["Stand tall holding light dumbbells.", "Raise arms out to sides until parallel with floor."], tip: "Lead with elbows."
        }
    };

    /* ========================================================================
       USER PROFILES & PLANS
       ======================================================================== */
    const users = {
        'ali': {
            name: 'Ali', color: 'var(--accent-ali)',
            plans: [
                { title: 'Push Day (Chest & Tris)', time: '40 Min', reqs: [{id: 'cable_chest_press', s: 4, r: 10}, {id: 'db_lateral_raise', s: 3, r: 12}] },
                { title: 'Pull Day (Back & Posture)', time: '40 Min', reqs: [{id: 'cable_row', s: 4, r: 10}, {id: 'face_pull', s: 4, r: 15}] }
            ]
        },
        'kristen': {
            name: 'Kristen', color: 'var(--accent-kristen)',
            plans: [
                { title: 'Pilates Upper Sculpt', time: '30 Min', reqs: [{id: 'face_pull', s: 3, r: 15}, {id: 'cable_row', s: 3, r: 15}] }
            ]
        },
        'kam': {
            name: 'Kam', color: 'var(--accent-kam)', youth: true,
            plans: [
                { title: 'Foundations A', time: '30 Min', reqs: [{id: 'cable_squat', s: 3, r: 10}, {id: 'cable_chest_press', s: 3, r: 12}] }
            ]
        },
        'ashton': {
            name: 'Ashton', color: 'var(--accent-ashton)', youth: true,
            plans: [
                { title: 'Ninja Agility', time: '15 Min', reqs: [{id: 'cable_squat', s: 3, r: 8}] }
            ]
        }
    };

    let curUserObj = null; let curUserId = ""; let timerInt; let timeLeft = 0;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-back').style.display = (id === 'screen-users') ? 'none' : 'block';
    }

    function navBack() {
        if (document.getElementById('screen-workout').classList.contains('active')) showScreen('screen-dash');
        else showScreen('screen-users');
        stopTimer();
    }

    function openDash(displayName, color, id) {
        curUserObj = users[id]; curUserId = id;
        document.documentElement.style.setProperty('--current-accent', color);
        document.getElementById('dash-title').innerText = `Hi, ${displayName}`;
        document.getElementById('app-header-title').style.color = color;

        const today = new Date().toDateString();
        const lastLog = localStorage.getItem(`${id}_lastLog`);
        const streak = parseInt(localStorage.getItem(`${id}_streak`) || 0);
        const banner = document.getElementById('smart-banner');
        const dashContent = document.getElementById('dash-content');
        
        banner.style.display = 'flex'; dashContent.style.display = 'block';

        if (curUserObj.youth && lastLog === today) {
            document.getElementById('smart-icon').innerText = "🛑";
            document.getElementById('smart-title').innerText = "Rest Enforced";
            document.getElementById('smart-msg').innerText = "Muscles grow when you rest! You've trained today. Go play!";
            document.getElementById('smart-msg').style.color = 'var(--danger)';
            dashContent.style.display = 'none';
        } else if (streak >= 3 && !curUserObj.youth) {
            document.getElementById('smart-icon').innerText = "⚠️";
            document.getElementById('smart-title').innerText = "Fatigue Detected";
            document.getElementById('smart-msg').innerText = `You've trained ${streak} days in a row. Volume auto-reduced by 1 set.`;
            document.getElementById('smart-msg').style.color = 'var(--accent-kam)';
            renderRoutines(true);
        } else {
            document.getElementById('smart-icon').innerText = "✅";
            document.getElementById('smart-title').innerText = "Ready to Train";
            document.getElementById('smart-msg').innerText = "Recovery optimal. Select your plan below.";
            document.getElementById('smart-msg').style.color = 'var(--text-muted)';
            renderRoutines(false);
        }
        showScreen('screen-dash');
    }

    function renderRoutines(reduceVolume) {
        const list = document.getElementById('routine-list'); list.innerHTML = "";
        curUserObj.plans.forEach((plan, idx) => {
            list.innerHTML += `
            <div class="menu-card" onclick="startWorkout('${idx}', ${reduceVolume})">
                <div><div class="menu-title">${plan.title}</div><div class="menu-meta"><span>⏱ ${plan.time}</span></div></div>
                <div style="color: var(--current-accent); font-weight: 800; font-size: 18px;">❯</div>
            </div>`;
        });
    }

    function startWorkout(planIdx, reduceVolume) {
        document.getElementById('workout-feed').innerHTML = "";
        const fBtn = document.getElementById('finish-btn');
        fBtn.style.color = (curUserObj.name === 'Ashton' || curUserObj.name === 'Kam') ? '#000' : '#FFF';

        const plan = curUserObj.plans[planIdx];
        document.getElementById('workout-title').innerText = plan.title;
        plan.reqs.forEach((req, i) => {
            let actualSets = reduceVolume ? Math.max(1, req.s - 1) : req.s;
            buildCard(req.id, actualSets, req.r, i);
        });
        showScreen('screen-workout');
    }

    function toggleCoach(id) { document.getElementById(id).classList.toggle('active'); }

    function buildCard(exId, sets, reps, domIdx) {
        const ex = db[exId];
        let stepsHTML = ""; ex.steps.forEach(s => stepsHTML += `<li>${s}</li>`);
        const lastWeight = localStorage.getItem(`${curUserId}_w_${exId}`) || "";
        
        let rows = "";
        for(let i=1; i<=sets; i++) {
            rows += `
            <tr id="row-${domIdx}-${i}">
                <td><div class="set-pill">${i}</div></td>
                <td><input type="number" class="val-input weight-val" placeholder="lbs" value="${lastWeight}"></td>
                <td><input type="number" class="val-input" value="${reps}"></td>
                <td><button class="check-btn" onclick="toggleSet('row-${domIdx}-${i}', '${exId}')"><svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z" fill="currentColor"/></svg></button></td>
            </tr>`;
        }

        const card = `
        <div class="exercise-card">
            <div class="ex-header">
                <div class="ex-title">${ex.name}</div>
                <div class="ex-target">${ex.target}</div>
            </div>
            
            <div class="vector-dashboard">
                <div class="vector-cell">
                    <div class="vector-label">ATTACHMENT</div>
                    <div class="vector-icon-container"><svg viewBox="0 0 24 24">${ex.icon}</svg></div>
                    <div class="vector-value">${ex.attName}</div>
                </div>
                <div class="vector-cell">
                    <div class="vector-label">SPACE / BENCH</div>
                    <div class="vector-icon-container"><svg viewBox="0 0 24 24">${ex.spaceIcon}</svg></div>
                    <div class="vector-value">${ex.spcName}</div>
                </div>
            </div>

            <div class="matrix-row">
                <div class="matrix-item">
                    <span class="matrix-label">TRACK HOLE</span>
                    <span class="matrix-val">${ex.h}</span>
                </div>
                <div class="matrix-item">
                    <span class="matrix-label">ARM DIAL</span>
                    <span class="matrix-val">${ex.a}</span>
                </div>
            </div>

            <button class="coach-toggle" onclick="toggleCoach('coach-${domIdx}')">
                <span>📖 Coach Guide & Form</span> <span style="color: var(--current-accent);">▼</span>
            </button>
            <div class="coach-content" id="coach-${domIdx}">
                <ul>${stepsHTML}</ul>
                <div class="tip-box">💡 <strong>Pro Tip:</strong> ${ex.tip}</div>
            </div>

            <div class="tracker-zone">
                <table class="tracker-table">
                    <thead><tr><th>Set</th><th>Lbs</th><th>Reps</th><th>Done</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        </div>`;
        document.getElementById('workout-feed').insertAdjacentHTML('beforeend', card);
    }

    function toggleSet(rowId, exId) {
        const row = document.getElementById(rowId);
        const inputs = row.querySelectorAll('.val-input');
        const weightInput = row.querySelector('.weight-val');
        
        if (row.classList.contains('row-done')) {
            row.classList.remove('row-done'); inputs.forEach(inp => inp.disabled = false);
        } else {
            row.classList.add('row-done'); inputs.forEach(inp => inp.disabled = true);
            if(weightInput && weightInput.value) { localStorage.setItem(`${curUserId}_w_${exId}`, weightInput.value); }
            startTimer(60); 
        }
    }

    function startTimer(sec) {
        clearInterval(timerInt); timeLeft = sec;
        document.getElementById('timer-sheet').classList.add('active'); updateTimer();
        timerInt = setInterval(() => {
            timeLeft--; updateTimer();
            if(timeLeft <= 0) { stopTimer(); if(navigator.vibrate) navigator.vibrate([200,100,200]); }
        }, 1000);
    }
    function stopTimer() { clearInterval(timerInt); document.getElementById('timer-sheet').classList.remove('active'); }
    function updateTimer() { let m = Math.floor(timeLeft/60); let s = timeLeft%60; document.getElementById('timer-display').innerText = `0${m}:${s<10?'0':''}${s}`; }

    function finishWorkout() {
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        const lastLog = localStorage.getItem(`${curUserId}_lastLog`);
        let streak = parseInt(localStorage.getItem(`${curUserId}_streak`) || 0);

        if (lastLog === yesterday) { streak += 1; } 
        else if (lastLog !== today) { streak = 1; }
        
        localStorage.setItem(`${curUserId}_lastLog`, today);
        localStorage.setItem(`${curUserId}_streak`, streak);

        alert("Workout saved to device memory! Great job.");
        navBack();
    }
</script>
</body>
</html>
