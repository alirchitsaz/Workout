<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080908">
  <title>Chitsaz Training Lab</title>
  <link rel="preload" as="image" href="assets/gym-front.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="brand" onclick="setView('today')" aria-label="Chitsaz Training Lab home">
        <span class="brand-mark">CF</span>
        <span class="brand-copy">
          <strong>Chitsaz Training Lab</strong>
          <small>Family home gym OS</small>
        </span>
      </button>
      <nav class="nav" id="nav" aria-label="Primary"></nav>
      <button class="primary top-start" onclick="startWorkout()">Start plan</button>
    </header>

    <section class="hero">
      <div class="hero-photo">
        <div class="hero-badge">
          <b>47</b>
          <span>room-ready movements</span>
        </div>
      </div>
      <div class="hero-copy">
        <span class="eyebrow">Built from your actual gym</span>
        <h1>Built for this room. Tuned for your family.</h1>
        <p>Dual-arm functional trainer, adjustable bench, light dumbbells, mat space, D-handles, rope, straight bar, and family-safe programming in one local app.</p>
        <div class="profiles" id="profiles"></div>
      </div>
    </section>

    <section class="workspace">
      <aside class="rail" id="rail"></aside>
      <main class="main" id="main"></main>
    </section>
  </div>

  <nav class="tabbar" id="tabs" aria-label="Mobile navigation"></nav>
  <div class="timer hide" id="timer"></div>
  <div class="drawer hide" id="drawer"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
