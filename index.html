function planWhy(split,pr){const bits=[];bits.push(`Chosen to train ${split.focus} while avoiding excessive repeat from recent sessions.`);if(State.assessment.sore.length)bits.push(`Sore areas are penalized: ${State.assessment.sore.map(label).join(', ')}.`);if(State.assessment.readiness<=3)bits.push('Readiness is low, so volume is reduced.');if(isYouth(pr))bits.push('Youth mode favors movement quality and lighter loading.');return bits.join(' ')}
function slotMuscles(slot){const map={horizontal_push:['chest','triceps','shoulders'],vertical_push:['shoulders','triceps'],fly:['chest'],horizontal_pull:['back','biceps'],vertical_pull:['back','biceps'],rear_delt:['shoulders','back'],shoulder_iso:['shoulders'],biceps:['biceps'],triceps:['triceps'],squat:['quads','glutes'],hinge:['hamstrings','glutes'],lunge:['quads','glutes'],hip:['glutes'],calf:['calves'],core_anti_rotation:['core'],core_stability:['core'],core_flexion:['core'],rotation:['core'],conditioning:['conditioning'],power:['conditioning','glutes'],carry:['core'],mobility:['mobility']};return map[slot]||[]}
function selectExercise(slot,pr,used){const recent=recentExerciseIds(pr.id,3);let pool=EXERCISES.filter(e=>e.patterns.includes(slot)&&!used.includes(e.id));if(!pool.length)pool=EXERCISES.filter(e=>e.patterns.some(x=>slotMuscles(slot).some(m=>e.muscles.includes(m)))&&!used.includes(e.id));pool=pool.filter(e=>ageOk(e,pr));let scored=pool.map(e=>({e,score:exerciseScore(e,slot,pr,recent)})).sort((a,b)=>b.score-a.score);const picked=scored[0]?.e;if(picked)used.push(picked.id);return picked}
function ageOk(e,pr){const age=pr.age||18;if(age<e.minAge)return false;if(isYouth(pr)&&e.level>2)return false;if(pr.age&&pr.age<10&&e.equipment==="functional_trainer"&&e.compound)return false;return true}
function exerciseScore(e,slot,pr,recent){let s=0;if(e.patterns.includes(slot))s+=35;if(e.goals.includes(activeGoal()))s+=10;if(e.goals.includes('general'))s+=3;if(pr.experience>=e.level)s+=6;else s-=5;if(!recent.includes(e.id))s+=16;else s-=25;if(isYouth(pr)){if(e.equipment==="bodyweight")s+=12;if(e.equipment==="functional_trainer"&&e.compound)s-=6;if(e.load==="time"||e.load==="reps")s+=4}for(const m of e.muscles){if(State.assessment.sore.includes(m))s-=12}s+=Math.random()*5;return s}
function prescribe(e,pr){const goal=activeGoal();let sets=3, reps='8-12', rest=60;if(e.load==='time'){reps=isYouth(pr)?'20s':'30s';sets=2;rest=35}else if(e.load==='bodyweight'||e.load==='reps'){reps=isYouth(pr)?'6-10':'10-15';sets=isYouth(pr)?2:3;rest=45}else if(goal==='strength'&&e.compound&&!isYouth(pr)){sets=4;reps='5-8';rest=90}else if(goal==='muscle'||goal==='recomp'){sets=e.compound?3:3;reps=e.compound?'8-12':'10-15';rest=e.compound?75:55}else if(goal==='fatloss'){sets=2;reps='12-15';rest=35}else if(goal==='athletic'){sets=2;reps=e.patterns.includes('power')?'3-6':'8-10';rest=e.patterns.includes('power')?70:45}if(State.assessment.readiness<=3)sets=Math.max(1,sets-1);if(State.assessment.duration==='extended'&&!isYouth(pr)&&!['time','bodyweight','reps'].includes(e.load))sets+=1;const target=loadSuggestion(e,pr,reps);return {exId:e.id,sets:Array.from({length:sets},(_,i)=>({targetWeight:target.weight,targetReps:target.reps||reps,rpe:'8',done:false,weight:target.weight,reps:''})),scheme:{sets,reps,rest},hint:target.hint}}
function loadSuggestion(e,pr,reps){if(e.load==='bodyweight'||e.load==='time'||e.load==='reps')return {weight:0,reps,hint:e.load==='time'?'Track seconds':'Track quality reps'};if(e.load==='db')return {weight:Math.min(15,pr.age&&pr.age<10?5:10),reps,hint:'Dumbbells cap at 15 lb, so use tempo and clean reps.'};const last=lastExercise(pr.id,e.id);let w=isYouth(pr)?10:30;if(e.compound)w=isYouth(pr)?20:50;if(last){w=last.weight||w;const hi=highRep(reps);if(last.reps>=hi&&Number(last.rpe)<=8)w+=10;if(Number(last.rpe)>=9.5)w-=10}if(pr.maxCable)w=Math.min(w,pr.maxCable);w=Math.max(10,Math.min(200,nearestStack(w)));return {weight:w,reps,hint:last?`Last best: ${last.weight} x ${last.reps} @ RPE ${last.rpe||'?'}. Suggested: ${w}.`:`Start at ${w} lb and adjust after set 1.`}}
function highRep(r){const m=String(r).match(/(\d+)\D*$/);return m?+m[1]:10}
function startPlan(idx){const plan=buildRecommendedPlans()[idx];State.activeWorkout={date:Date.now(),title:plan.title,splitId:plan.splitId,focus:plan.focus,goal:plan.goal,duration:plan.duration,readiness:State.assessment.readiness,exercises:plan.exercises};save();showScreen('workout')}
function startManual(){State.activeWorkout={date:Date.now(),title:'Manual Builder',splitId:'manual',focus:'manual',goal:activeGoal(),duration:0,readiness:State.assessment.readiness,exercises:[]};save();showScreen('workout')}
function renderWorkout(){const w=State.activeWorkout;screenEl('workout').innerHTML=!w?`<h1>No active workout.</h1><p class="sub">Generate a plan from Today or build one manually.</p><button class="btn" onclick="showScreen('dashboard')">Go to Today</button>`:`<h1>${escapeHtml(w.title)}</h1><p class="sub">${escapeHtml(w.focus)} - ${w.exercises.length} exercises - readiness ${w.readiness}</p>${w.splitId==='manual'?manualAddBox():''}<div class="workout-layout">${w.exercises.map((rx,i)=>exerciseCard(rx,i)).join('')}</div><button class="btn" onclick="finishWorkout()">Complete Session</button>`}
function manualAddBox(){return `<div class="card pad" style="margin-bottom:16px"><div class="form"><label>Add exercise</label><select id="manualSelect">${EXERCISES.map(e=>`<option value="${e.id}">${e.name} - ${e.group}</option>`).join('')}</select><button class="btn secondary" onclick="addManualExercise()">Add to workout</button></div></div>`}
function addManualExercise(){const id=document.getElementById('manualSelect').value;State.activeWorkout.exercises.push(prescribe(ex(id),p()));save();renderWorkout()}
function exerciseCard(rx,i){const e=ex(rx.exId);return `<div class="card exercise"><div class="ex-top row"><div><div class="ex-name">${escapeHtml(e.name)}</div><div class="ex-target">${escapeHtml(e.group)} - ${e.patterns.map(label).join(' / ')}</div></div><div class="ex-actions"><button class="iconbtn" onclick="swapExercise(${i})">Swap</button></div></div>${setupViz(e)}<div class="setup-grid">${setupCells(e)}</div><div class="coach"><details><summary>Coach guide <span>+</span></summary><ul>${e.cues.map(c=>`<li>${escapeHtml(c)}</li>`).join('')}</ul><div class="tip"><b>Tip:</b> ${escapeHtml(e.tip)}</div></details></div><div class="loadhint"><b>Load:</b> ${escapeHtml(rx.hint||'Use clean technique.')}</div><div class="tracker"><div class="labels"><span>Set</span><span>Load</span><span>Reps</span><span>RPE</span><span>Done</span></div>${rx.sets.map((s,j)=>setRow(i,j,s,e)).join('')}</div></div>`}
function setRow(i,j,s,e){return `<div class="setrow ${s.done?'done':''}" id="row-${i}-${j}"><div class="setlab">${j+1}</div><input class="field" type="number" inputmode="numeric" value="${s.weight||''}" ${e.load==='bodyweight'||e.load==='time'||e.load==='reps'?'placeholder="BW"':''} onchange="updateSet(${i},${j},'weight',this.value)"><input class="field" type="text" value="${s.reps||''}" placeholder="${escapeHtml(s.targetReps)}" onchange="updateSet(${i},${j},'reps',this.value)"><input class="field" type="number" step=".5" min="6" max="10" value="${s.rpe||8}" onchange="updateSet(${i},${j},'rpe',this.value)"><button class="check" onclick="toggleSet(${i},${j})">${s.done?'OK':'+'}</button></div>`}
function updateSet(i,j,k,v){State.activeWorkout.exercises[i].sets[j][k]=v;save()}
function toggleSet(i,j){const w=State.activeWorkout;const set=w.exercises[i].sets[j];const e=ex(w.exercises[i].exId);if(!set.done){if(!set.reps)set.reps=set.targetReps;if(e.load==='cable'&&!set.weight)set.weight=w.exercises[i].sets[j].targetWeight;set.done=true;startRest(w.exercises[i].scheme.rest||60)}else set.done=false;save();renderWorkout()}
function setupCells(e){const s=e.setup;if(e.equipment==='functional_trainer')return `<div class="setup-cell"><small>Attachment</small><b>${escapeHtml(e.attachment)}</b></div><div class="setup-cell"><small>Position</small><b>${escapeHtml(s.position)}</b></div><div class="setup-cell"><small>Track height</small><b>${s.height?`Hole ${s.height}`:'Varies'}</b></div><div class="setup-cell"><small>Angle / lever</small><b>${s.angle?`Angle ${s.angle}`:'Varies'} / ${s.lever?`Lever ${s.lever}`:'Varies'}</b></div>`;return `<div class="setup-cell"><small>Equipment</small><b>${escapeHtml(e.attachment)}</b></div><div class="setup-cell"><small>Where</small><b>${escapeHtml(s.position)}</b></div>`}
function setupViz(e){if(e.equipment!=='functional_trainer')return `<div class="setup-viz"><div class="soft" style="text-align:center;color:var(--muted)">No cable setup required. Use ${escapeHtml(e.attachment)}.</div></div>`;const s=e.setup;const h=s.height||5,a=s.angle||5,l=s.lever||5;const y=20+((h-1)*16);const leftX=80-(a*4),rightX=120+(a*4);const frontEndY=y+(l*6);return `<div class="setup-viz"><div class="viz-grid"><div class="vizbox"><div class="vizlabel">Top view</div><svg viewBox="0 0 200 160"><rect x="62" y="15" width="76" height="22" rx="5" fill="#364158"/><line x1="80" y1="37" x2="${leftX}" y2="104" stroke="#35a3ff" stroke-width="7" stroke-linecap="round"/><line x1="120" y1="37" x2="${rightX}" y2="104" stroke="#35a3ff" stroke-width="7" stroke-linecap="round"/><circle cx="100" cy="124" r="11" fill="#38d67a"/><line x1="${leftX}" y1="104" x2="96" y2="124" stroke="#ffd166" stroke-dasharray="4 4"/><line x1="${rightX}" y1="104" x2="104" y2="124" stroke="#ffd166" stroke-dasharray="4 4"/><text x="100" y="152" fill="#9aa3b8" font-size="11" text-anchor="middle">You / bench here</text></svg></div><div class="vizbox"><div class="vizlabel">Front height</div><svg viewBox="0 0 200 160"><rect x="76" y="10" width="9" height="140" rx="3" fill="#364158"/><rect x="116" y="10" width="9" height="140" rx="3" fill="#364158"/><line x1="80" y1="${y}" x2="38" y2="${frontEndY}" stroke="#35a3ff" stroke-width="7" stroke-linecap="round"/><line x1="120" y1="${y}" x2="162" y2="${frontEndY}" stroke="#35a3ff" stroke-width="7" stroke-linecap="round"/><circle cx="38" cy="${frontEndY}" r="6" fill="#ffd166"/><circle cx="162" cy="${frontEndY}" r="6" fill="#ffd166"/><rect x="70" y="${y-6}" width="22" height="12" rx="4" fill="#7c5cff"/><rect x="108" y="${y-6}" width="22" height="12" rx="4" fill="#7c5cff"/></svg></div></div></div>`}
function swapExercise(i){const current=ex(State.activeWorkout.exercises[i].exId);const alts=EXERCISES.filter(e=>e.id!==current.id&&e.group===current.group&&ageOk(e,p())).slice(0,20);openSheet(`<h3>Swap ${escapeHtml(current.name)}</h3><div class="library-list">${alts.map(e=>`<button class="lib-item" onclick="doSwap(${i},'${e.id}')"><div><h4>${escapeHtml(e.name)}</h4><p>${escapeHtml(e.equipment)} - ${e.patterns.map(label).join(', ')}</p></div><span class="tag">Swap</span></button>`).join('')}</div><button class="btn secondary" style="margin-top:12px" onclick="closeSheet()">Cancel</button>`)}
function doSwap(i,id){State.activeWorkout.exercises[i]=prescribe(ex(id),p());save();closeSheet();renderWorkout()}
function finishWorkout(){const w=State.activeWorkout;if(!w)return;let totalSets=0,totalVolume=0,muscles=new Set();const details=w.exercises.map(rx=>{const e=ex(rx.exId);e.muscles.forEach(m=>muscles.add(m));let top={weight:0,reps:0,rpe:0};const sets=rx.sets.filter(s=>s.done).map(s=>{const wt=Number(s.weight)||0;const reps=parseInt(s.reps)||0;const rpe=Number(s.rpe)||0;totalSets++;totalVolume+=wt*reps;if(wt>top.weight||(wt===top.weight&&reps>top.reps))top={weight:wt,reps,rpe};return {weight:wt,reps,rpe}});if(sets.length&&e.load==='cable')saveLast(p().id,e.id,top);return {exId:e.id,name:e.name,sets}});if(totalSets===0){alert('Log at least one completed set.');return}State.history.unshift({profileId:p().id,date:Date.now(),title:w.title,splitId:w.splitId,focus:w.focus,goal:w.goal,readiness:w.readiness,totalSets,totalVolume,muscles:[...muscles],exercises:details});State.activeWorkout=null;save();showScreen('history')}
function histFor(uid){return State.history.filter(h=>h.profileId? h.profileId===uid : true).slice(0,50)}
function statsFor(uid){const h=histFor(uid);return {sessions:h.length,volume:h.reduce((s,x)=>s+(x.totalVolume||0),0),streak:streak(h)}}
function streak(h){if(!h.length)return 0;let days=[...new Set(h.map(x=>new Date(x.date).toDateString()))].map(d=>new Date(d).getTime()).sort((a,b)=>b-a);let cur=new Date().setHours(0,0,0,0),st=0;for(const d of days){if(Math.abs((cur-d)/86400000-st)<.1)st++;else if(st===0&&Math.abs((cur-d)/86400000-1)<.1){cur-=86400000;st++}else break}return st}
function recentExerciseIds(uid,days){const cutoff=Date.now()-days*86400000;return histFor(uid).filter(h=>h.date>=cutoff).flatMap(h=>h.exercises||[]).map(e=>e.exId)}
function lastExercise(uid,id){const all=histFor(uid).flatMap(h=>(h.exercises||[]).map(e=>({...e,date:h.date}))).filter(e=>e.exId===id&&e.sets&&e.sets.length);if(!all.length)return null;const last=all.sort((a,b)=>b.date-a.date)[0];let best={weight:0,reps:0,rpe:8};last.sets.forEach(s=>{if(s.weight>best.weight||(s.weight===best.weight&&s.reps>best.reps))best=s});return best}
function saveLast(uid,id,best){const key='last_'+uid+'_'+id;localStorage.setItem(key,JSON.stringify(best))}
function recovery(uid){const map={};MUSCLES.forEach(m=>map[m]=100);histFor(uid).slice(0,15).forEach(h=>{const d=daysAgo(h.date);(h.muscles||[]).forEach(m=>{const val=d<1?20:d<2?50:d<3?70:90;map[m]=Math.min(map[m]||100,val)})});State.assessment.sore.forEach(m=>map[m]=Math.min(map[m]||100,25));return map}
function recoveryMapHtml(uid){const r=recovery(uid);return MUSCLES.filter(m=>m!=='mobility').map(m=>`<div class="rec-row"><span>${label(m)}</span><div class="bar"><i style="width:${r[m]||100}%"></i></div><span>${r[m]||100}%</span></div>`).join('')}
function renderLibrary(){const f=State.libraryFilter;let list=EXERCISES.filter(e=>(f.group==='all'||e.group===f.group)&&(f.equipment==='all'||e.equipment===f.equipment)&&(!f.q||e.name.toLowerCase().includes(f.q.toLowerCase())||e.muscles.join(' ').includes(f.q.toLowerCase())));screenEl('library').innerHTML=`<h1>Library</h1><p class="sub">${EXERCISES.length} movements custom-tagged for this room.</p><div class="card pad form" style="margin-bottom:14px"><label>Search</label><input value="${escapeHtml(f.q)}" oninput="State.libraryFilter.q=this.value;save();renderLibrary()" placeholder="row, chest, core..."><div class="grid2"><select onchange="State.libraryFilter.group=this.value;save();renderLibrary()"><option value="all">All groups</option>${[...new Set(EXERCISES.map(e=>e.group))].map(g=>`<option ${f.group===g?'selected':''}>${g}</option>`).join('')}</select><select onchange="State.libraryFilter.equipment=this.value;save();renderLibrary()"><option value="all">All equipment</option>${[...new Set(EXERCISES.map(e=>e.equipment))].map(g=>`<option ${f.equipment===g?'selected':''}>${g}</option>`).join('')}</select></div></div><div class="library-list">${list.map(e=>libItem(e)).join('')}</div>`}
function libItem(e){return `<div class="lib-item"><div><h4>${escapeHtml(e.name)}</h4><p>${escapeHtml(e.group)} - ${escapeHtml(e.equipment)} - ${e.patterns.map(label).join(', ')}</p></div><button class="btn small secondary" onclick="libraryDetails('${e.id}')">View</button></div>`}
function libraryDetails(id){const e=ex(id);openSheet(`<h3>${escapeHtml(e.name)}</h3><p class="sub">${escapeHtml(e.group)} - ${escapeHtml(e.equipment)}</p>${setupViz(e)}<div class="setup-grid">${setupCells(e)}</div><div class="eyebrow">Cues</div><ul style="margin-left:20px;color:#d7dcea;line-height:1.5">${e.cues.map(c=>`<li>${escapeHtml(c)}</li>`).join('')}</ul><div class="tip"><b>Tip:</b> ${escapeHtml(e.tip)}</div><button class="btn secondary" style="margin-top:14px" onclick="closeSheet()">Close</button>`) }
function renderHistory(){const h=histFor(p().id);const stats=statsFor(p().id);screenEl('history').innerHTML=`<h1>History</h1><p class="sub">Recent sessions, volume, and PR signals.</p><div class="grid3"><div class="metric"><div class="v">${stats.sessions}</div><div class="l">Sessions</div></div><div class="metric"><div class="v">${Math.round(stats.volume/1000)}k</div><div class="l">Total lb</div></div><div class="metric"><div class="v">${stats.streak}</div><div class="l">Streak</div></div></div><div class="eyebrow">Recent</div>${h.length?h.map(sessionHtml).join(''):'<div class="empty">No workouts yet.</div>'}<div class="eyebrow">Data</div><div class="grid2"><button class="btn secondary" onclick="exportData()">Export JSON</button><button class="btn secondary" onclick="importData()">Import JSON</button></div>`}
function sessionHtml(s){return `<div class="history-item"><h4>${escapeHtml(s.title)}</h4><p>${fmt(s.date)} - ${s.focus||''} - ${s.totalSets} sets - ${s.totalVolume} lb - readiness ${s.readiness}</p></div>`}
function renderAI(){const pr=p();const h=histFor(pr.id).slice(0,5);const payload={mission:'Create or refine a home-gym training plan for this family gym app.',equipment:{machine:'Dual-arm functional trainer',stack:'10 lb increments up to 200 lb per arm',adjustments:'height track, arm angle, lever position per arm',extras:['flat bench','attachments','dumbbells up to 15 lb','open floor','ball']},activeProfile:pr,assessment:State.assessment,recentHistory:h,libraryCount:EXERCISES.length,requestedOutput:'Return safe workout logic, exercise additions, progression rules, and UX improvements.'};screenEl('ai').innerHTML=`<h1>AI Coach Export</h1><p class="sub">This gives you the AI flex without exposing API keys in a public GitHub file. Copy the context into ChatGPT, or later wire it to a private serverless endpoint.</p><div class="warnbox"><b>Important:</b> Keep API keys out of public GitHub Pages. For real in-app AI later, use a tiny private backend/proxy.</div><div class="eyebrow">Context package</div><textarea id="aiText" style="width:100%;min-height:360px;border-radius:18px;border:1px solid var(--line);background:rgba(0,0,0,.25);color:white;padding:14px;font-family:ui-monospace,Menlo,monospace;font-size:12px">${escapeHtml(JSON.stringify(payload,null,2))}</textarea><button class="btn" style="margin-top:12px" onclick="copyAI()">Copy AI Context</button>`}
function copyAI(){navigator.clipboard?.writeText(document.getElementById('aiText').value);alert('Copied.');}
function openSettings(){openSheet(`<h3>Menu</h3><div class="stack"><button class="btn secondary" onclick="editProfile('${p().id}')">Edit active profile</button><button class="btn secondary" onclick="editProfile(null)">Add profile</button><button class="btn secondary" onclick="showScreen('profiles');closeSheet()">Switch profile</button><button class="btn secondary" onclick="resetDemo()">Reset local demo data</button><button class="btn secondary" onclick="closeSheet()">Close</button></div>`)}
function editProfile(id){const pr=id?State.profiles.find(x=>x.id===id):{id:'p'+Date.now(),name:'New Profile',age:30,type:'adult',goal:'general',experience:1,color:'#35a3ff',notes:''};openSheet(`<h3>${id?'Edit':'Add'} profile</h3><div class="form"><label>Name</label><input id="pfName" value="${escapeHtml(pr.name)}"><label>Age</label><input id="pfAge" type="number" value="${pr.age||''}"><label>Type</label><select id="pfType"><option ${pr.type==='adult'?'selected':''} value="adult">Adult</option><option ${pr.type==='youth'?'selected':''} value="youth">Youth</option></select><label>Goal</label><select id="pfGoal">${Object.entries(GOALS).map(([k,v])=>`<option value="${k}" ${pr.goal===k?'selected':''}>${v}</option>`).join('')}</select><label>Experience 1-5</label><input id="pfExp" type="number" min="1" max="5" value="${pr.experience||1}"><label>Color</label><input id="pfColor" type="color" value="${pr.color||'#35a3ff'}"><label>Notes</label><textarea id="pfNotes">${escapeHtml(pr.notes||'')}</textarea><button class="btn" onclick="saveProfile('${pr.id}',${id?'true':'false'})">Save profile</button><button class="btn secondary" onclick="closeSheet()">Cancel</button></div>`)}
function saveProfile(id,exists){const pr={id,name:document.getElementById('pfName').value||'Profile',age:Number(document.getElementById('pfAge').value)||null,type:document.getElementById('pfType').value,goal:document.getElementById('pfGoal').value,experience:Number(document.getElementById('pfExp').value)||1,color:document.getElementById('pfColor').value,notes:document.getElementById('pfNotes').value};if(exists){const i=State.profiles.findIndex(x=>x.id===id);State.profiles[i]=pr}else State.profiles.push(pr);State.activeProfileId=id;save();closeSheet();showScreen('dashboard')}
function resetDemo(){if(confirm('Clear local app data on this device?')){localStorage.removeItem(KEY);State=clone(DEFAULT);closeSheet();showScreen('profiles')}}
function exportData(){const blob=new Blob([JSON.stringify(State,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='family-fit-data.json';a.click()}
function importData(){openSheet(`<h3>Import data</h3><p class="sub">Paste a previous export JSON.</p><textarea id="importBox" style="width:100%;height:220px;border-radius:16px;background:rgba(0,0,0,.25);color:white;border:1px solid var(--line);padding:12px"></textarea><button class="btn" onclick="doImport()">Import</button><button class="btn secondary" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`)}
function doImport(){try{State=merge(JSON.parse(document.getElementById('importBox').value),clone(DEFAULT));save();closeSheet();render()}catch(e){alert('Invalid JSON')}}
function startRest(sec){TimerLeft=sec;document.getElementById('timer').classList.add('on');tickRest();clearInterval(Timer);Timer=setInterval(()=>{TimerLeft--;tickRest();if(TimerLeft<=0)stopRest()},1000)}
function tickRest(){const m=Math.floor(Math.max(0,TimerLeft)/60),s=Math.max(0,TimerLeft)%60;document.getElementById('timerValue').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function addRest(sec){TimerLeft+=sec;tickRest()}
function stopRest(){clearInterval(Timer);document.getElementById('timer').classList.remove('on')}
function openSheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('modal').classList.add('on')}
function closeSheet(){document.getElementById('modal').classList.remove('on')}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
showScreen('profiles');
</script>
