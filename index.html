<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Family Fit OS</title>
<style>
:root{
  --bg:#000; --surface:rgba(28,28,30,.72); --surface-solid:#1C1C1E;
  --elev:rgba(58,58,60,.85); --text:#fff; --muted:#8E8E93; --border:rgba(255,255,255,.1);
  --ali:#0A84FF; --kristen:#BF5AF2; --kam:#FF9F0A; --ashton:#32D74B;
  --accent:#0A84FF; --success:#32D74B; --warn:#FFD60A;
  --blur:blur(24px) saturate(180%);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);display:flex;justify-content:center;-webkit-user-select:none;user-select:none;overflow-x:hidden;min-height:100vh}

.glow{position:fixed;top:-20vh;left:-10vw;width:120vw;height:60vh;background:radial-gradient(ellipse,var(--accent) 0%,transparent 65%);opacity:.15;z-index:-1;transition:background .6s;pointer-events:none;filter:blur(40px)}
#app{width:100%;max-width:480px;min-height:100vh;position:relative;padding-bottom:120px;display:flex;flex-direction:column}

/* Header & Nav */
header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 14px;padding-top:max(20px,env(safe-area-inset-top));background:rgba(0,0,0,.6);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.h-title{font-size:16px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);transition:color .3s}
.btn-nav{background:none;border:none;color:var(--text);font-size:15px;font-weight:600;cursor:pointer;padding:8px 0;min-width:60px;text-align:left}

/* Screens */
.screen{display:none;padding:20px;animation:fadeUp .4s cubic-bezier(.16,1,.3,1);flex:1}
.screen.active{display:block}
@keyframes fadeUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
h1{font-size:34px;font-weight:800;letter-spacing:-1px;margin-bottom:6px;line-height:1.05}
.sub{color:var(--muted);font-size:15px;font-weight:500;margin-bottom:28px;line-height:1.4}
.sec{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.4px;margin:26px 0 12px}

/* Profile grid */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:22px 14px;text-align:center;cursor:pointer;transition:.2s;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
.pcard:active{transform:scale(.95);background:var(--elev)}
.av{width:68px;height:68px;border-radius:34px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:30px;background:rgba(0,0,0,.4);border:2px solid;}
.pname{font-size:17px;font-weight:800;margin-bottom:2px}
.pdesc{font-size:12px;color:var(--muted);font-weight:600}

/* Menus */
.mlist{display:flex;flex-direction:column;gap:10px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;backdrop-filter:var(--blur);transition:.2s}
.mcard:active{background:var(--elev);transform:scale(.98)}
.mtitle{font-size:16px;font-weight:800;margin-bottom:3px}
.mmeta{font-size:13px;color:var(--muted);font-weight:600}
.mchev{color:var(--accent);font-weight:800;font-size:18px}

/* DYNAMIC SVG SETUP DIAGRAMS */
.setup-visuals { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; background: #111; padding: 16px; border-bottom: 1px solid var(--border); }
.svg-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;}
.svg-label { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; width: 100%; text-align: center;}
svg { width: 100%; height: auto; max-height: 120px; }

/* Exercise card */
.excard{background:var(--surface-solid);border-radius:22px;margin-bottom:24px;border:1px solid var(--border);overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.ex-h{padding:18px 20px;background:rgba(255,255,255,.02);border-bottom: 1px solid var(--border);}
.ex-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.ex-target{font-size:12px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1px}

/* Data Matrix */
.data-matrix { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
.dm-cell { padding: 12px 16px; border-right: 1px solid var(--border); }
.dm-cell:last-child { border-right: none; }
.dm-lbl { font-size: 10px; color: var(--muted); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }
.dm-val { font-size: 14px; font-weight: 700; color: #fff; }

/* Coach Guide */
.coach-t{width:100%;background:rgba(0,0,0,.2);border:none;border-bottom:1px solid var(--border);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer}
.coach-c{display:none;padding:20px;font-size:14px;line-height:1.5;color:#D1D1D6;background:rgba(0,0,0,.4);border-bottom:1px solid var(--border)}
.coach-c.active{display:block;}
.guide-h{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.coach-c ul{padding-left:20px;margin-bottom:16px}
.tipbox{background:rgba(255,255,255,.08);padding:14px;border-radius:10px;border-left:3px solid var(--warn);color:#fff;font-size:13px}

/* Tracker */
.trk{padding:16px 12px 20px}
.trk-tbl{width:100%;border-collapse:separate;border-spacing:0 8px}
.trk-tbl th{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;padding-bottom:2px}
.trk-tbl td{text-align:center;vertical-align:middle;padding:0 2px}
.setpill{background:rgba(255,255,255,.1);width:28px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-weight:800;font-size:12px;color:var(--muted)}
.val-in{background:rgba(255,255,255,.06);border:1px solid var(--border);color:#fff;width:100%;max-width:70px;padding:12px 4px;border-radius:10px;text-align:center;font-size:16px;font-weight:800;-moz-appearance:textfield}
.val-in:focus{outline:none;border-color:var(--accent)}
.chk{background:rgba(255,255,255,.1);border:none;width:50px;height:42px;border-radius:12px;margin:0 auto;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s}
.chk svg{fill:var(--muted);width:20px;height:20px}
.done .chk{background:var(--success)}
.done .chk svg{fill:#000}
.done .val-in{background:transparent;border-color:transparent;color:var(--success);pointer-events:none}
.done .setpill{background:var(--success);color:#000}

/* Finish */
.finish{width:100%;background:var(--accent);color:#fff;border:none;padding:20px;border-radius:18px;font-size:17px;font-weight:800;cursor:pointer;margin-top:10px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.finish:active{transform:scale(.97)}

/* Timer sheet */
#tsheet{position:fixed;bottom:0;left:0;width:100%;background:rgba(28,28,30,.95);backdrop-filter:var(--blur);padding:18px 20px;padding-bottom:max(18px,env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);z-index:1000}
#tsheet.on{transform:translateY(0)}
.tval{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.tlbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.skip{background:rgba(255,255,255,.1);color:#fff;border:none;padding:12px 24px;border-radius:14px;font-weight:800;font-size:15px;cursor:pointer}

</style>
</head>
<body>
<div class="glow" id="glow"></div>
<div id="app">
  <header>
    <button class="btn-nav hidden" id="btnBack" onclick="navBack()">‹ Back</button>
    <div class="h-title" id="hTitle">FAMILY FIT</div>
    <div style="width:60px"></div>
  </header>

  <!-- USERS -->
  <div id="scr-users" class="screen active">
    <h1>Welcome.</h1>
    <p class="sub">Choose your profile to load your settings.</p>
    <div class="pgrid">
      <div class="pcard" onclick="pickUser('ali')"><div class="av" style="border-color:var(--ali);color:var(--ali)">💪</div><div class="pname">Ali</div><div class="pdesc">Strength · Recomp</div></div>
      <div class="pcard" onclick="pickUser('kristen')"><div class="av" style="border-color:var(--kristen);color:var(--kristen)">🧘‍♀️</div><div class="pname">Kristen</div><div class="pdesc">Pilates+ Strength</div></div>
      <div class="pcard" onclick="pickUser('kam')"><div class="av" style="border-color:var(--kam);color:var(--kam)">⚡</div><div class="pname">Kam · 13</div><div class="pdesc">Foundations</div></div>
      <div class="pcard" onclick="pickUser('ashton')"><div class="av" style="border-color:var(--ashton);color:var(--ashton)">🏃‍♂️</div><div class="pname">Ashton · 8</div><div class="pdesc">Movement Play</div></div>
    </div>
  </div>

  <!-- DASH -->
  <div id="scr-dash" class="screen">
    <h1 id="dTitle">Hi</h1>
    <p class="sub">Select a routine for today.</p>
    
    <div class="sec">Programmed Plans</div>
    <div class="mlist" id="planList"></div>
  </div>

  <!-- WORKOUT -->
  <div id="scr-workout" class="screen">
    <h1 id="wTitle" style="margin-bottom:24px">Workout</h1>
    <div id="wFeed"></div>
    <button class="finish" onclick="finishWorkout()">Complete Session</button>
  </div>

  <!-- TIMER -->
  <div id="tsheet">
    <div><div class="tlbl">Recovery</div><div class="tval" id="tDisp">01:00</div></div>
    <div style="display:flex;gap:6px">
      <button class="skip" onclick="addTime(15)">+15s</button>
      <button class="skip" onclick="stopTimer()">Skip</button>
    </div>
  </div>
</div>

<script>
/* ==============================================================
   1. EXERCISE DATABASE (With Physical Coordinates)
   Track: 1 (High) to 8 (Low).
   Dial: 1 (Narrow) to 11 (Wide).
   Bench Orientation: 'long-ways', 'horizontal', 'none'
   Bench Distance: 'center-close', 'pulled-back'
   ============================================================== */
const DB = {
  cbl_flat_press:{
    n:"Flat Cable Bench Press", t:"Chest", 
    track: 8, dial: 4, att: "D-Handles",
    bench: { type: 'long-ways', pos: 'center-close' },
    guide:{
      setup:["Slide the bench so it points long-ways, directly between the arms.","Set both pulleys to the lowest hole (8).","Set the arms slightly wide (Dial 4)."],
      exec:["Lie flat, starting with handles near armpits.","Press straight up and slightly together.","Lower slowly over 2 seconds."],
      focus:"Keep shoulder blades pinned to the bench. Don't let cables pull your shoulders up."
    }
  },
  cbl_row_seated:{
    n:"Seated Cable Row", t:"Back", 
    track: 6, dial: 1, att: "V-Bar",
    bench: { type: 'none', pos: '' },
    guide:{
      setup:["Set arms to the narrowest setting (Dial 1).","Attach the V-Bar to both clips.","Sit on the floor, bracing feet on the machine frame."],
      exec:["Sit up with a straight back.","Pull V-Bar to belly button, driving elbows back.","Let arms fully extend for a stretch."],
      focus:"Squeeze shoulder blades together BEFORE your arms start pulling."
    }
  },
  cbl_fly:{
    n:"Standing Chest Fly", t:"Chest", 
    track: 4, dial: 9, att: "D-Handles",
    bench: { type: 'none', pos: '' },
    guide:{
      setup:["Set pulleys to chest height (Track 4).","Swing arms out very wide (Dial 9).","Stand centered, take one step forward."],
      exec:["With a slight elbow bend, hug your arms in a wide arc.","Bring hands together in front of chest."],
      focus:"Keep your chest proud. Don't press the weight—hug it."
    }
  },
  cbl_goblet_squat:{
    n:"Cable Goblet Squat", t:"Quads & Glutes", 
    track: 8, dial: 1, att: "Straight Bar",
    bench: { type: 'none', pos: '' },
    guide:{
      setup:["Set pulleys to bottom (8) and narrowest (1).","Hold bar tight against your collarbone.","Stand facing the machine."],
      exec:["Push hips back and down like sitting in a chair.","Keep chest tall. Drive through heels to stand."],
      focus:"Resist the cable pulling you forward. Keep weight in your heels."
    }
  },
  cbl_face_pull:{
    n:"Cable Face Pull", t:"Rear Delts (Posture)", 
    track: 2, dial: 1, att: "Tricep Rope",
    bench: { type: 'none', pos: '' },
    guide:{
      setup:["Set pulleys high (Track 2) and narrow (Dial 1).","Grab rope with thumbs pointing back."],
      exec:["Pull hands apart and back toward your ears.","Elbows should flare out high and wide."],
      focus:"This is a posture fixer. Focus intensely on squeezing your upper back."
    }
  },
  db_lateral:{
    n:"DB Lateral Raise", t:"Shoulders", 
    track: 0, dial: 0, att: "Dumbbells",
    bench: { type: 'none', pos: '' },
    guide:{
      setup:["Grab light dumbbells. Stand tall with open floor space."],
      exec:["Raise arms out to sides until parallel with floor.","Lower slowly."],
      focus:"Lead with your elbows. Don't swing your torso."
    }
  }
};

/* ==============================================================
   2. SVG DIGITAL TWIN RENDERER
   Generates the machine layout based on Track and Dial coords.
   ============================================================== */
function renderSetupGraphics(track, dial, benchConfig, color) {
    if(track === 0) return `<div style="padding:20px; text-align:center; color:var(--muted); font-size:12px; font-weight:700;">FREE WEIGHTS - NO MACHINE REQ.</div>`;

    // Top-Down Floor Plan Logic
    // Arms pivot from center (x:100, y:30). 
    // Dial 1 = pointing straight down (90 deg). Dial 11 = pointing straight out to sides (0/180 deg).
    const maxAngle = 90; // 90 degrees total rotation from bottom to side
    const anglePerDial = maxAngle / 10;
    const currentAngle = (dial - 1) * anglePerDial; // 0 to 90
    
    // Left Arm (Rotates clockwise from straight down)
    const leftRot = 90 - currentAngle; 
    // Right Arm (Rotates counter-clockwise from straight down)
    const rightRot = 90 + currentAngle;

    // Bench Logic
    let benchSVG = '';
    if(benchConfig.type === 'long-ways') {
        const yPos = benchConfig.pos === 'center-close' ? 50 : 80;
        benchSVG = `<rect x="90" y="${yPos}" width="20" height="60" rx="3" fill="#444" stroke="#222" stroke-width="2"/>`;
    }

    const topDownSVG = `
        <div class="svg-box">
            <div class="svg-label">Floor Plan (Top)</div>
            <svg viewBox="0 0 200 150">
                <!-- Machine Base -->
                <rect x="70" y="10" width="60" height="20" rx="4" fill="#333" />
                <!-- Left Arm -->
                <g transform="translate(85, 20) rotate(${leftRot})">
                    <line x1="0" y1="0" x2="50" y2="0" stroke="#666" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="0" r="4" fill="${color}"/>
                </g>
                <!-- Right Arm -->
                <g transform="translate(115, 20) rotate(${rightRot})">
                    <line x1="0" y1="0" x2="50" y2="0" stroke="#666" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="0" r="4" fill="${color}"/>
                </g>
                <!-- Bench -->
                ${benchSVG}
            </svg>
        </div>
    `;

    // Front Elevation Logic (Track 1 = High/Y:10, Track 8 = Low/Y:140)
    const trackY = 10 + ((track - 1) * (130 / 7));

    const frontSVG = `
        <div class="svg-box">
            <div class="svg-label">Height (Front)</div>
            <svg viewBox="0 0 100 160">
                <!-- Center Columns -->
                <rect x="35" y="10" width="6" height="140" fill="#333" />
                <rect x="59" y="10" width="6" height="140" fill="#333" />
                
                <!-- Track Holes Indicator -->
                <line x1="50" y1="10" x2="50" y2="150" stroke="#222" stroke-width="2" stroke-dasharray="2 16"/>

                <!-- Adjustable Carriage -->
                <rect x="30" y="${trackY - 5}" width="40" height="10" rx="2" fill="${color}" />
                <circle cx="50" cy="${trackY}" r="3" fill="#fff"/>
            </svg>
        </div>
    `;

    return `<div class="setup-visuals">${topDownSVG}${frontSVG}</div>`;
}

/* ==============================================================
   3. ROUTINES & USERS
   ============================================================== */
const TEMPLATES = {
  ali:[
      {title:"Push Day (Chest/Tris)", exs:[{id:"cbl_flat_press",s:4,r:10}, {id:"cbl_fly",s:3,r:12}, {id:"db_lateral",s:3,r:15}]},
      {title:"Pull & Legs", exs:[{id:"cbl_row_seated",s:4,r:10}, {id:"cbl_goblet_squat",s:4,r:10}, {id:"cbl_face_pull",s:3,r:15}]}
  ],
  kristen:[
      {title:"Pilates Upper Tone", exs:[{id:"cbl_row_seated",s:3,r:15}, {id:"cbl_face_pull",s:3,r:15}, {id:"db_lateral",s:3,r:15}]}
  ],
  kam:[
      {title:"Foundations Full Body", exs:[{id:"cbl_goblet_squat",s:3,r:10}, {id:"cbl_flat_press",s:3,r:12}, {id:"cbl_row_seated",s:3,r:12}]}
  ],
  ashton:[
      {title:"Ninja Movement", exs:[{id:"cbl_goblet_squat",s:3,r:8}, {id:"db_lateral",s:2,r:10}]}
  ]
};

const USERS = {
  ali:{name:"Ali",color:"var(--ali)"},
  kristen:{name:"Kristen",color:"var(--kristen)"},
  kam:{name:"Kam",color:"var(--kam)",youth:1},
  ashton:{name:"Ashton",color:"var(--ashton)",youth:1}
};

let S={uid:"",user:null,timerInt:null,timeLeft:0};

/* ==============================================================
   4. APP ENGINE
   ============================================================== */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('btnBack').style.display = id==='scr-users'?'none':'block';
  window.scrollTo(0,0);
}
function navBack(){ show('scr-dash'); stopTimer(); }

function pickUser(uid){
  S.uid=uid;S.user=USERS[uid];
  document.documentElement.style.setProperty('--accent',S.user.color);
  document.getElementById('dTitle').innerText=`Hi, ${S.user.name}`;
  document.getElementById('hTitle').style.color=S.user.color;
  
  const list=document.getElementById('planList'); list.innerHTML="";
  TEMPLATES[uid].forEach((p,i)=>{
    list.innerHTML+=`<div class="mcard" onclick="startWorkout(${i})">
      <div><div class="mtitle">${p.title}</div><div class="mmeta">Tap to start</div></div>
      <div class="mchev">›</div></div>`;
  });
  show('scr-dash');
}

function startWorkout(planIdx){
  document.getElementById('wFeed').innerHTML="";
  const plan=TEMPLATES[S.uid][planIdx];
  document.getElementById('wTitle').innerText=plan.title;
  
  plan.exs.forEach((req,i)=>{ buildCard(req.id, req.s, req.r, i); });
  show('scr-workout');
}

function buildCard(exId,sets,reps,idx){
  const ex=DB[exId];
  const lastWeight = localStorage.getItem(`${S.uid}_w_${exId}`) || "";
  
  // Build Tracker Rows
  let rows="";
  for(let i=1;i<=sets;i++){
    rows+=`
      <tr id="r-${idx}-${i}">
        <td><div class="setpill">${i}</div></td>
        <td><input type="number" class="val-in wv" placeholder="lbs" value="${lastWeight}"></td>
        <td><input type="number" class="val-in rv" placeholder="${reps}"></td>
        <td><button class="chk" onclick="toggleSet('r-${idx}-${i}','${exId}')"><svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z" fill="currentColor"/></svg></button></td>
      </tr>`;
  }
  
  const setupGraphics = renderSetupGraphics(ex.track, ex.dial, ex.bench, S.user.color);
  const stepsHTML = ex.guide.setup.concat(ex.guide.exec).map(s=>`<li>${s}</li>`).join("");

  const card=`<div class="excard">
    <div class="ex-h">
      <div class="ex-title">${ex.n}</div>
      <div class="ex-target">${ex.t}</div>
    </div>
    
    <!-- DIGITAL TWIN VISUALIZER -->
    ${setupGraphics}

    <div class="data-matrix">
        <div class="dm-cell"><span class="dm-lbl">🔗 Attachment</span><span class="dm-val">${ex.att}</span></div>
        <div class="dm-cell"><span class="dm-lbl">↔️ Arm Dial (1-11)</span><span class="dm-val">Pos ${ex.dial||'N/A'}</span></div>
    </div>

    <button class="coach-t" onclick="document.getElementById('c-${idx}').classList.toggle('active')">
        <span>📖 View Setup & Form Guide</span><span style="color:var(--accent)">▼</span>
    </button>
    <div class="coach-c" id="c-${idx}">
      <div class="guide-h">Step-by-Step</div>
      <ul>${stepsHTML}</ul>
      <div class="tipbox">💡 <strong>Focus:</strong> ${ex.guide.focus}</div>
    </div>

    <div class="trk">
      <table class="trk-tbl"><thead><tr><th>Set</th><th>Lbs (Each)</th><th>Reps</th><th>Done</th></tr></thead><tbody>${rows}</tbody></table>
    </div>
  </div>`;
  document.getElementById('wFeed').insertAdjacentHTML('beforeend',card);
}

function toggleSet(rowId, exId){
  const row=document.getElementById(rowId);
  if(row.classList.contains('done')){
    row.classList.remove('done'); row.querySelectorAll('.val-in').forEach(i=>i.disabled=false);
  }else{
    row.classList.add('done'); row.querySelectorAll('.val-in').forEach(i=>i.disabled=true);
    const w = row.querySelector('.wv').value;
    if(w) localStorage.setItem(`${S.uid}_w_${exId}`, w); // Save memory
    startTimer(60); 
  }
}

function startTimer(sec){
  clearInterval(S.timerInt); S.timeLeft=sec; document.getElementById('tsheet').classList.add('on'); updateTimerUI();
  S.timerInt=setInterval(()=>{
    S.timeLeft--; updateTimerUI();
    if(S.timeLeft<=0){ stopTimer(); if(navigator.vibrate) navigator.vibrate([200,100,200]); }
  }, 1000);
}
function addTime(sec) { S.timeLeft += sec; updateTimerUI(); }
function stopTimer(){ clearInterval(S.timerInt); document.getElementById('tsheet').classList.remove('on'); }
function updateTimerUI(){ let m=Math.floor(S.timeLeft/60), s=S.timeLeft%60; document.getElementById('tDisp').innerText=`0${m}:${s<10?'0':''}${s}`; }

function finishWorkout() { alert("Session Logged! Great work."); navBack(); }
</script>
